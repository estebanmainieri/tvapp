<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TVApp</title>
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #0D0D0D;
      }
      /* Ensure react-native-web's wrapper divs fill height */
      #root > div {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      #root > div > div {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
